name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
      version: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Ghostlog.app
        run: |
          xcodebuild \
            -project Ghostlog.xcodeproj \
            -scheme Ghostlog \
            -configuration Release \
            -derivedDataPath /tmp/ghostlog-build \
            build

      - name: Create DMG
        run: |
          APP=/tmp/ghostlog-build/Build/Products/Release/Ghostlog.app
          DMG=Ghostlog-${{ github.ref_name }}.dmg

          hdiutil create \
            -volname "Ghostlog" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG"

          echo "DMG=$DMG" >> $GITHUB_ENV

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_ENV
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
          body: |
            ## Ghostlog ${{ github.ref_name }}

            ### Install via Homebrew
            ```
            brew tap ghostlog-dev/tap
            brew install ghostlog-dev/tap/ghostlog
            ```

            ### Manual install
            Download the DMG, open it, and drag Ghostlog to Applications.

            ---
            **SHA256:** `${{ env.SHA256 }}`

  update-tap:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ghostlog-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Cask formula
        run: |
          VERSION=${{ needs.build.outputs.version }}
          SHA256=${{ needs.build.outputs.sha256 }}
          # Strip leading 'v' for the version field
          VERSION_NUM=${VERSION#v}

          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" Casks/ghostlog.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/ghostlog.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ghostlog.rb
          git commit -m "chore: update ghostlog to ${{ needs.build.outputs.version }}"
          git push
