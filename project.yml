name: Ghostlog
options:
  bundleIdPrefix: com.ghostlog
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Ghostlog:
    type: application
    platform: macOS
    sources:
      - path: Ghostlog
    resources:
      - path: Ghostlog/Assets.xcassets
    info:
      path: Ghostlog/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSScreenCaptureUsageDescription: "Ghostlog needs screen recording to detect which project you're working on."
        NSAppleEventsUsageDescription: "Ghostlog reads the active browser URL to track which project you're working on."
        NSAccessibilityUsageDescription: "Ghostlog reads the active browser URL (Firefox/Zen) to track which project you're working on."
        NSHumanReadableCopyright: ""
        CFBundleURLTypes:
          - CFBundleURLName: com.ghostlog.app
            CFBundleURLSchemes:
              - ghostlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostlog.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        MARKETING_VERSION: "1.0.7"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GhostlogTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GhostlogTests
    dependencies:
      - target: Ghostlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostlog.tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: "YES"
